<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Form Inputs Example</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      padding: 30px;
    }
    .section {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <h2 class="mb-4">Bootstrap 4 Form Inputs Collection</h2>

  <!-- 1. Basic Text Input -->
  <div class="section">
    <h5>Text Input</h5>
    <input type="text" class="form-control" placeholder="Enter text">
  </div>

  <!-- 2. Password Input -->
  <div class="section">
    <h5>Password Input</h5>
    <input type="password" class="form-control" placeholder="Enter password">
  </div>

  <!-- 3. Email Input -->
  <div class="section">
    <h5>Email Input</h5>
    <input type="email" class="form-control" placeholder="name@example.com">
  </div>

  <!-- 4. URL Input -->
  <div class="section">
    <h5>URL Input</h5>
    <input type="url" class="form-control" placeholder="https://">
  </div>

  <!-- 5. Telephone Input -->
  <div class="section">
    <h5>Telephone Input</h5>
    <input type="tel" class="form-control" placeholder="123-456-7890">
  </div>

  <!-- 6. Number Input -->
  <div class="section">
    <h5>Number Input</h5>
    <input type="number" class="form-control" placeholder="Enter a number">
  </div>

  <!-- 7. Date Input -->
  <div class="section">
    <h5>Date Input</h5>
    <input type="date" class="form-control">
  </div>

  <!-- 8. Time Input -->
  <div class="section">
    <h5>Time Input</h5>
    <input type="time" class="form-control">
  </div>

  <!-- 9. Week Input -->
  <div class="section">
    <h5>Week Input</h5>
    <input type="week" class="form-control">
  </div>

  <!-- 10. Month Input -->
  <div class="section">
    <h5>Month Input</h5>
    <input type="month" class="form-control">
  </div>

  <!-- 11. Color Picker -->
  <div class="section">
    <h5>Color Picker</h5>
    <input type="color" class="form-control form-control-color" value="#563d7c">
  </div>

  <!-- 12. Range Slider -->
  <div class="section">
    <h5>Range Slider</h5>
    <input type="range" class="form-control-range" min="0" max="100">
  </div>

  <!-- 13. Search Input -->
  <div class="section">
    <h5>Search Input</h5>
    <input type="search" class="form-control" placeholder="Search...">
  </div>

  <!-- 14. Placeholder Example -->
  <div class="section">
    <h5>Placeholder Field</h5>
    <input type="text" class="form-control" placeholder="Placeholder text">
  </div>

  <!-- 15. Read-Only & Disabled -->
  <div class="section">
    <h5>Read-Only & Disabled Inputs</h5>
    <input type="text" class="form-control mb-2" value="Read-only value" readonly>
    <input type="text" class="form-control" placeholder="Disabled input" disabled>
  </div>

  <!-- 16. Autofocus Example -->
  <div class="section">
    <h5>Autofocus Input</h5>
    <input type="text" class="form-control" placeholder="Auto-focus on load" autofocus>
  </div>

</body>

<!-- Bootstrap 4 JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script
 src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
